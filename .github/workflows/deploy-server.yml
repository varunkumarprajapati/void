name: Deploy Backend to Oracle Free Tier

on:
  push:
    branches:
      - main # Triggers the workflow whenever you push code to the main branch
    paths:
      - "server/**"

env:
  REGISTRY: ghcr.io
  # Converts your repository name to lowercase automatically to prevent Docker naming errors
  IMAGE_NAME: ${{ github.repository }}-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and Push Production Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          target: production # <--- CRITICAL: Skips development stages for a tiny 1GB RAM footprint
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code again (to access docker-compose.prod.yml)
        uses: actions/checkout@v4

      - name: Copy production docker-compose file to Oracle Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "server/docker-compose.prod.yml"
          target: "/home/ubuntu/apps/backend/"

      - name: Execute Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Navigate to your organized backend folder
            cd /home/ubuntu/apps/backend

            # Re-create your production environment variables from GitHub Secrets
            echo "${{ secrets.ENV_FILE }}" > .env

            # Authenticate the Oracle instance's Docker engine with GitHub Packages
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the fresh production-ready image built just moments ago
            # Converting image name to lowercase manually in bash to match GitHub's convention
            IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" | tr '[:upper:]' '[:lower:]')
            docker pull $IMAGE_LOWER

            # Deploy using the production file configuration override
            docker compose -f docker-compose.prod.yml up -d --force-recreate

            # Clean up old dangling Docker images to preserve disk space on Oracle
            docker image prune -f
